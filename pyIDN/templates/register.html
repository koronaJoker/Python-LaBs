{% extends "base.html" %}

{% block title %}Регистрация | Магазин вкусняшек{% endblock %}

{% block content %}
<section class="form-page">
    <h1>Регистрация</h1>
    <form class="product-form" method="post" action="{{ url_for('auth.register') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <label>
            Имя пользователя
            <input type="text" name="username" required minlength="3" autofocus>
        </label>
        <label>
            Пароль
            <input type="password" name="password" required minlength="6">
        </label>
        <label>
            Подтвердите пароль
            <input type="password" name="confirm_password" required minlength="6">
        </label>
        <button type="submit">Зарегистрироваться</button>
        <p class="form-note">Уже есть аккаунт? <a href="{{ url_for('auth.login') }}">Войти</a></p>
    </form>
</section>
{% endblock %}
